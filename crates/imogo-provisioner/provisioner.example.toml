# imogo-provisioner example configuration.
# Copy to provisioner.toml and adjust. Real provisioner.toml is git-ignored.

[http]
listen = "127.0.0.1:8080"
request_timeout_secs = 30

[log]
filter = "imogo_provisioner=info,tower_http=info,matrix_sdk=info"
json = false

# Matrix homeserver connections.
# Each entry is keyed by a logical name (e.g. b2b, b2c) which is also used
# in the inbound AS endpoint URLs the homeserver is configured to call.
#
# Example registration URL on the homeserver side for the `b2b` entry:
#   url: http://localhost:8080/_matrix/app/v1/b2b
#
# IMPORTANT: tokens shown here are placeholders. Real tokens belong in the
# git-ignored provisioner.toml or in environment variables.

[matrix.homeservers.b2b]
url = "https://matrix.imogo.de"
server_name = "imogo.de"
appservice_id = "imogo-provisioner"
as_token = "REPLACE_ME_WITH_REAL_AS_TOKEN"
hs_token = "REPLACE_ME_WITH_REAL_HS_TOKEN"
sender_localpart = "imogo-provisioner"

[matrix.homeservers.b2c]
url = "https://matrix.endkunden.imogo.de"
server_name = "endkunden.imogo.de"
appservice_id = "imogo-provisioner"
as_token = "REPLACE_ME_WITH_REAL_AS_TOKEN"
hs_token = "REPLACE_ME_WITH_REAL_HS_TOKEN"
sender_localpart = "imogo-provisioner"

# Inbound webhook configuration (license server).
[webhook]
# Webhook requests outside this many seconds from current time are rejected.
max_timestamp_skew_secs = 300
# Legacy field, kept for schema compatibility. The persistent nonce store
# replaced the in-memory LRU.
nonce_cache_capacity = 10000
# How long a nonce stays in the persistent cache before garbage collection.
nonce_ttl_secs = 600

# SQLite database (audit log + persistent nonce cache).
[db]
path = "./imogo-provisioner.db"
max_connections = 5

# B2C end-customer policy.
[b2c]
b2c_homeserver = "b2c"
default_qr_token_ttl_days = 90
max_qr_token_ttl_days = 365
guest_index_max = 999
public_redeem_base_url = "https://rechnung.imogo.de/r"

# Provisioning policy: which homeserver receives B2B accounts, who is invited
# into every newly created support room, what tiers are allowed.
[provisioning]
b2b_homeserver = "b2b"
support_invitees = ["@support-team:imogo.de"]
allowed_tiers = ["solo", "kmu", "pro", "enterprise"]
